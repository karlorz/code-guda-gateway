name: docker-image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag to build and publish (e.g. v0.3.6-stable)
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_REPO: karlorz/code-guda-gateway
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/code-guda-gateway

jobs:
  docker_amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.release_tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Checkout release tag
        run: |
          git fetch --force --tags origin
          git checkout "${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        run: |
          {
            echo "COMMIT=$(git rev-parse --short HEAD)"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_ENV}"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest-amd64
            ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}-amd64
            ${{ env.GHCR_REPO }}:latest-amd64
            ${{ env.GHCR_REPO }}:${{ env.VERSION }}-amd64

  docker_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.release_tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Checkout release tag
        run: |
          git fetch --force --tags origin
          git checkout "${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build metadata
        run: |
          {
            echo "COMMIT=$(git rev-parse --short HEAD)"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "${GITHUB_ENV}"

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest-arm64
            ${{ env.DOCKERHUB_REPO }}:${{ env.VERSION }}-arm64
            ${{ env.GHCR_REPO }}:latest-arm64
            ${{ env.GHCR_REPO }}:${{ env.VERSION }}-arm64

  docker_manifest:
    runs-on: ubuntu-latest
    needs:
      - docker_amd64
      - docker_arm64
    steps:
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.release_tag }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${DOCKERHUB_REPO}:latest" \
            "${DOCKERHUB_REPO}:latest-amd64" \
            "${DOCKERHUB_REPO}:latest-arm64"
          docker buildx imagetools create \
            --tag "${DOCKERHUB_REPO}:${VERSION}" \
            "${DOCKERHUB_REPO}:${VERSION}-amd64" \
            "${DOCKERHUB_REPO}:${VERSION}-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_REPO}:latest" \
            "${GHCR_REPO}:latest-amd64" \
            "${GHCR_REPO}:latest-arm64"
          docker buildx imagetools create \
            --tag "${GHCR_REPO}:${VERSION}" \
            "${GHCR_REPO}:${VERSION}-amd64" \
            "${GHCR_REPO}:${VERSION}-arm64"
