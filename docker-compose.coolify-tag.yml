# Coolify-oriented compose with a pinned multi-arch image tag.
# Mirror of CLIProxyAPI/docker-compose.coolify-tag.yml for this gateway.
#
# IMPORTANT (Coolify on cloud01 and similar):
# - Do NOT publish host ports (no "8080:8080"). coolify-proxy/Traefik already
#   binds host :8080; host publish fails with "port is already allocated".
# - Leave Coolify's per-service internal network (default). Do not require
#   external "aigateway" unless you intentionally join a shared mesh.
# - Coolify injects Traefik labels and attaches the service network.
#
# Local docker compose only: optionally add ports: ["8080:8080"] if the host
# is free. Prefer Coolify FQDN / Traefik for production.
#
# Coolify: bump image tag when promoting releases (see deploy/.../stable).
# Persist the two volume binds so SQLite + master.key survive redeploys.
#
# First boot auto-migrates SQLite and creates master.key if missing.
# Create admin token / gateway keys via Coolify terminal or:
#   docker exec <container> guda-gateway-admin token init
services:
  code-guda-gateway:
    image: 'karlorz/code-guda-gateway:v0.3.8-stable'
    environment:
      - 'DEPLOY=${DEPLOY:-}'
      - SERVICE_FQDN_CODEGUDAGATEWAY_8080
      - 'ADDR=0.0.0.0:8080'
      - 'DB_PATH=/var/lib/code-guda-gateway/gateway.db'
      - 'GUDA_MASTER_KEY_PATH=/etc/code-guda-gateway/master.key'
      # Behind Coolify TLS: keep Secure cookies. Set false only for plain-HTTP debug.
      - 'GUDA_ADMIN_COOKIE_SECURE=${GUDA_ADMIN_COOKIE_SECURE:-true}'
    # No host ports — Traefik routes to container :8080 on Coolify network.
    expose:
      - '8080'
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      # SQLite DB (and related files under this directory)
      - './data:/var/lib/code-guda-gateway'
      # master.key (created on first start if absent; do not lose this volume)
      - './etc:/etc/code-guda-gateway'
